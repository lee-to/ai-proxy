[proxy]
listen_addr = "127.0.0.1:8080"
anthropic_upstream_url = "https://api.anthropic.com"
codex_upstream_url = "https://api.openai.com"
codex_subscription_url = "https://chatgpt.com/backend-api/codex/responses"
codex_subscription_routing_enabled = true
rate_limit_enabled = true
max_body_size = 10485760       # 10 MB
connect_timeout_secs = 10
request_timeout_secs = 0       # 0 disables total request timeout for streaming/SSE
rate_limit_rps = 50
mitm_enabled = true
mitm_ca_cert_path = "certs/ai-proxy-ca.pem"       # auto-created with key on first MITM start
mitm_ca_key_path = "certs/ai-proxy-ca-key.pem"    # private key; keep local and do not trust/install
mitm_cert_cache_size = 256
mitm_excluded_hosts = []
websocket_mode = "inspect"                       # reject | passthrough | inspect

[dashboard]
enabled = false
listen_addr = "127.0.0.1:18081"                  # loopback only; use ssh -L for remote access
token_path = "~/.ai-proxy/dashboard.token"       # generated on first start; use an absolute path like /etc/ai-proxy/dashboard.token for systemd/prod
sqlite_path = "ai-proxy-telemetry.sqlite"
retention_hours = 24

[dashboard.capture]
prompts = false
responses = false
max_body_bytes = 8192
redact_before_store = true

[redaction]
strategy = "partial"
prefix_len = 3
suffix_len = 3
mask = "***...***"
response_restore_enabled = false
restorable_categories = ["email", "phone"]       # add person_name only if response restore is safe for your deployment

[scanner]
enabled = false
scan_scope = "body"
header_whitelist = [
    "x-api-key",
    "authorization",
    "cookie",
    "anthropic-version",
    "anthropic-beta",
]

[scanner.model]
enabled = false
mode = "hybrid"                    # hybrid | verify_only | direct
endpoint = "http://127.0.0.1:11434/v1/chat/completions"
model = "llama3.1"
timeout_ms = 750
max_chars = 8192
fail_policy = "regex_only"         # regex_only | fail_closed
categories = ["email", "person_name", "phone"]

[scanner.privacy_filter]
enabled = false
endpoint = "http://127.0.0.1:18082/scan"         # local adapter for OpenAI Privacy Filter
command = ""                                     # alternatively: "opf" to run the local CLI with --format json
command_args = []                                # example: ["--device", "cpu", "--no-print-color-coded-text"]
timeout_ms = 750
max_chars = 8192
fail_policy = "regex_only"                      # regex_only | fail_closed
categories = [
    "private_person",
    "private_email",
    "private_phone",
    "private_address",
    "private_url",
    "private_date",
    "account_number",
    "secret",
]
min_confidence = 0.70

[scanner.entropy]
enabled = true
threshold = 4.5
min_length = 20
max_length = 256
keywords = ["key", "secret", "token", "password", "passwd", "credential", "auth"]
keyword_proximity = 50

[scanner.structural]
enabled = true
detect_jwt = true
detect_connection_strings = true
detect_env_patterns = true

[scanner.regex]
enabled = true

[[scanner.regex.patterns]]
name = "aws_access_key"
pattern = "AKIA[0-9A-Z]{16}"

[[scanner.regex.patterns]]
name = "aws_secret_key"
pattern = "(?i)aws_secret_access_key\\s*[=:]\\s*[A-Za-z0-9/+=]{40}"

[[scanner.regex.patterns]]
name = "github_token"
pattern = "gh[pousr]_[A-Za-z0-9_]{36,}"

[[scanner.regex.patterns]]
name = "anthropic_api_key"
pattern = "sk-ant-[A-Za-z0-9-]{20,}"

[[scanner.regex.patterns]]
name = "openai_api_key"
pattern = "sk-[A-Za-z0-9]{20,}"

[[scanner.regex.patterns]]
name = "email"
pattern = "[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}"

[[scanner.regex.patterns]]
name = "generic_secret_assignment"
pattern = "(?i)(password|secret|token|api_key|apikey|private_key)\\s*[=:]\\s*[\"'][^\"']{8,}[\"']"

[[scanner.regex.patterns]]
name = "private_key_block"
pattern = "-----BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----"
